# MBit — checks de PR distribuídos
# Squads MB incluem este workflow no seu repo via:
#   uses: mercadobitcoin/mb-ai-sdk/.github/workflows/mb-ai-checks.yml@main

name: MBit · AI Checks

on:
  pull_request:
    branches: [main, master, develop]
  workflow_call:

jobs:
  secret-scan:
    name: Secret scan (defensivo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar segredos no diff do PR
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          DIFF=$(git diff "$BASE_SHA"..HEAD)
          PATTERNS='AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ya29\.[0-9A-Za-z_-]+|-----BEGIN (RSA|EC|DSA|OPENSSH|PGP) PRIVATE KEY-----|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|glpat-[A-Za-z0-9_-]{20}|xox[baprs]-[A-Za-z0-9-]+|sk-[A-Za-z0-9]{32,}'
          if echo "$DIFF" | grep -E "$PATTERNS" > /tmp/hits.txt; then
            echo "::error::Segredo detectado no PR:"
            cat /tmp/hits.txt
            exit 1
          fi
          echo "✓ Sem segredos detectados"

  pii-scan:
    name: PII scan brasileira
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar PII no diff (CPF, CNPJ, cartão)
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          # Lista arquivos modificados, exclui paths de teste/fixture
          FILES=$(git diff --name-only "$BASE_SHA"..HEAD | grep -v -iE 'test|spec|fixture|mock|example|seed' || true)
          [[ -z "$FILES" ]] && echo "Nenhum arquivo de produção alterado." && exit 0
          FAIL=0
          for f in $FILES; do
            [[ ! -f "$f" ]] && continue
            if grep -EH '\b[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}\b' "$f" | grep -v '000\.000\.000-00\|111\.111\.111-11'; then
              echo "::error file=$f::CPF detectado"
              FAIL=1
            fi
            if grep -EH '\b[0-9]{2}\.[0-9]{3}\.[0-9]{3}/[0-9]{4}-[0-9]{2}\b' "$f"; then
              echo "::error file=$f::CNPJ detectado"
              FAIL=1
            fi
          done
          [[ $FAIL -eq 1 ]] && exit 1
          echo "✓ Sem PII brasileira detectada"

  spec-coverage:
    name: Spec coverage (se PR referencia spec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar verification.md para spec referenciada
        run: |
          # Procura referência a spec na descrição do PR ou commits
          SPEC_REF=$(git log --format=%B origin/${{ github.base_ref }}..HEAD | grep -oE '\[spec:[a-z0-9-]+\]' | head -1 || true)
          if [[ -z "$SPEC_REF" ]]; then
            echo "Sem referência a spec ativa — OK para PRs de infra/chore"
            exit 0
          fi
          SLUG=$(echo "$SPEC_REF" | sed 's/\[spec://;s/\]//')
          SPEC_DIR=$(find docs/specs -path "*${SLUG}*" -type d 2>/dev/null | head -1)
          if [[ -z "$SPEC_DIR" ]]; then
            echo "::warning::Spec ${SLUG} referenciada mas pasta não encontrada"
            exit 0
          fi
          if [[ ! -f "$SPEC_DIR/verification.md" ]]; then
            echo "::error::Spec ${SLUG} não tem verification.md — fase VERIFY incompleta"
            exit 1
          fi
          echo "✓ verification.md presente"

  commit-format:
    name: Convenção de commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validar formato de mensagens
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          BAD=0
          # Aceita: [spec:slug] msg | [hotfix:slug] msg | [chore:area] msg | [docs:area] msg | [retro] msg | [runbook] ...
          PATTERN='^\[(spec|hotfix|chore|docs|retro|runbook|review|skills|spike|learnings|mb-bootstrap|mb-bootstrap-rescan|mb-enrich-domain|mb-enrich-runbooks|mb-enrich-skills|mb-snapshot)(:[a-z0-9-]+)?\]'
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -Eq "$PATTERN"; then
              echo "::warning::Mensagem fora do padrão MB: $msg"
              BAD=$((BAD+1))
            fi
          done < <(git log --format=%s "$BASE_SHA"..HEAD)
          # Não bloqueia ainda — só avisa (em squads maduros vira block)
          [[ $BAD -gt 0 ]] && echo "$BAD commit(s) fora do padrão"
          echo "✓ Validação concluída"

  manifest-validation:
    name: Validar manifestos JSON do SDK (apenas se for PR ao SDK)
    runs-on: ubuntu-latest
    if: github.event.repository.name == 'mb-ai-sdk'
    steps:
      - uses: actions/checkout@v4
      - name: Validar todos os JSON
        run: |
          set -e
          for f in $(find . -name 'plugin.json' -o -name 'marketplace.json' -o -name 'hooks.json' -o -name 'mcp-allowlist.json' -o -name 'definitions.json'); do
            jq empty "$f" || { echo "::error::JSON inválido: $f"; exit 1; }
          done
          echo "✓ Todos os manifestos JSON são válidos"
      - name: Validar scripts shell
        run: |
          for s in $(find . -name '*.sh'); do
            bash -n "$s" || { echo "::error::Sintaxe inválida: $s"; exit 1; }
          done
          echo "✓ Todos os scripts shell têm sintaxe válida"
